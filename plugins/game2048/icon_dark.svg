<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- 2048 tile with number hint - brighter version for dark theme -->
  <rect x="2" y="2" width="20" height="20" rx="3" fill="#EDC22E" stroke="#F5D54A" stroke-width="0.5"/>
  <!-- number 2048 stylized -->
  <text x="12" y="10" font-family="Arial, sans-serif" font-size="4.5" font-weight="bold" fill="#F9F6F2" text-anchor="middle">2048</text>
  <!-- subtle grid lines - brighter for dark theme -->
  <line x1="2" y1="7" x2="22" y2="7" stroke="#F5D54A" stroke-width="0.3" opacity="0.3"/>
  <line x1="2" y1="12" x2="22" y2="12" stroke="#F5D54A" stroke-width="0.3" opacity="0.3"/>
  <line x1="2" y1="17" x2="22" y2="17" stroke="#F5D54A" stroke-width="0.3" opacity="0.3"/>
  <line x1="7" y1="2" x2="7" y2="22" stroke="#F5D54A" stroke-width="0.3" opacity="0.3"/>
  <line x1="12" y1="2" x2="12" y2="22" stroke="#F5D54A" stroke-width="0.3" opacity="0.3"/>
  <line x1="17" y1="2" x2="17" y2="22" stroke="#F5D54A" stroke-width="0.3" opacity="0.3"/>
</svg>